<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentiSphere AI | Feedback Explorer</title>
    <link rel="stylesheet" href="../css/app.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
  </head>
  <body class="bg-grain min-h-screen font-sans text-ink-900 bg-mesh bg-ink-50 antialiased">
    <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-ink-950/50 backdrop-blur-sm hidden md:hidden" aria-hidden="true"></div>

    <div class="flex min-h-screen w-full">
      <aside
        id="sidebar"
        class="fixed left-0 top-0 z-50 flex h-full w-full max-w-[18rem] -translate-x-full flex-col border-r border-white/10 bg-gradient-to-b from-ink-950 to-ink-900 text-white shadow-2xl transition-transform duration-200 ease-out md:static md:z-0 md:max-w-none md:w-72 md:translate-x-0 md:shadow-none md:border-r-0"
      >
        <div class="flex h-16 items-center justify-between border-b border-white/10 px-5 md:h-auto md:border-0 md:px-6 md:pt-8">
          <div>
            <p class="font-display text-lg font-semibold tracking-tight">SentiSphere</p>
            <p class="text-xs text-white/50">HR</p>
          </div>
          <button
            type="button"
            id="sidebarClose"
            class="rounded-lg p-2 text-white/70 hover:bg-white/10 md:hidden"
            aria-label="Close menu"
          >
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <nav class="flex-1 space-y-1 px-3 py-4 md:px-4">
          <a href="./admin-dashboard.html" class="sidebar-link text-white/80 hover:bg-white/10 hover:text-white">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 11.25v2.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
            </svg>
            Dashboard
          </a>
          <a href="./admin-feedback.html" class="sidebar-link bg-white/10 text-white ring-1 ring-white/10">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
            Feedback explorer
          </a>
          <a href="./admin-employees.html" class="sidebar-link text-white/80 hover:bg-white/10 hover:text-white">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
            </svg>
            Employee insights
          </a>
        </nav>
        <div class="border-t border-white/10 p-4">
          <button
            id="logoutBtn"
            type="button"
            class="sidebar-link w-full text-left text-red-200 hover:bg-red-500/20 hover:text-white"
          >
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Sign out
          </button>
        </div>
      </aside>

      <button
        type="button"
        id="sidebarOpen"
        class="fixed left-4 top-4 z-30 flex h-11 w-11 items-center justify-center rounded-xl bg-white shadow-soft ring-1 ring-ink-900/5 md:hidden"
        aria-label="Open menu"
      >
        <svg class="h-5 w-5 text-ink-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <main class="flex-1 pt-8 md:pt-0">
        <div class="mx-auto max-w-7xl space-y-8 px-4 pb-12 pt-16 md:px-8 md:pt-10">
          <header>
            <h1 class="font-display text-3xl font-semibold text-ink-900">Feedback explorer</h1>
            <p class="mt-1 text-slate-600">Filter and search multilingual records.</p>
          </header>

          <section class="rounded-2xl bg-white p-6 shadow-card ring-1 ring-ink-900/5 md:p-8">
            <h2 class="font-display text-lg font-semibold text-ink-900">Filters</h2>
            <form id="filterForm" class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6">
              <select
                id="language"
                class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
              >
                <option value="">All languages</option>
                <option value="Sinhala">Sinhala</option>
                <option value="Tamil">Tamil</option>
                <option value="English">English</option>
              </select>
              <select
                id="mood"
                class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
              >
                <option value="">All stress levels</option>
                <option value="Happy">Low (model)</option>
                <option value="Neutral">Medium (model)</option>
                <option value="Stressed">High (model)</option>
                <option value="Angry">Angry (legacy)</option>
              </select>
              <select
                id="emotion"
                class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
              >
                <option value="">All emotions</option>
                <option value="Positive">Positive</option>
                <option value="Neutral">Neutral</option>
                <option value="Negative">Negative</option>
              </select>
              <input
                id="fromDate"
                type="date"
                class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
              />
              <input
                id="toDate"
                type="date"
                class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20"
              />
              <input
                id="query"
                type="text"
                placeholder="Search name or message"
                class="rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 placeholder:text-slate-400 focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-500/20 sm:col-span-2 xl:col-span-1"
              />
              <div class="sm:col-span-2 lg:col-span-3 xl:col-span-6">
                <button
                  type="submit"
                  class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-brand-600 px-5 py-3 text-sm font-semibold text-white shadow-soft transition hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 sm:w-auto"
                >
                  Apply filters
                </button>
              </div>
            </form>
            <div id="countLabel" class="mt-4 text-sm text-slate-500"></div>
          </section>

          <section class="rounded-2xl bg-white p-6 shadow-card ring-1 ring-ink-900/5 md:p-8">
            <div class="table-shell overflow-x-auto">
              <table class="w-full min-w-[900px] text-left text-sm">
                <thead>
                  <tr class="text-xs font-semibold uppercase tracking-wide text-slate-500">
                    <th class="px-4 py-3">Employee</th>
                    <th class="px-4 py-3">Email</th>
                    <th class="px-4 py-3">Language</th>
                    <th class="px-4 py-3">Stress</th>
                    <th class="px-4 py-3">Emotion</th>
                    <th class="px-4 py-3">Score</th>
                    <th class="px-4 py-3">Date</th>
                    <th class="px-4 py-3">Message</th>
                  </tr>
                </thead>
                <tbody id="resultsBody" class="divide-y divide-slate-100 text-slate-700"></tbody>
              </table>
            </div>
          </section>
          <div id="messageBox" class="text-sm"></div>
        </div>
      </main>
    </div>

    <script>
      const API_BASE = "http://localhost:3001/api";
      const token = localStorage.getItem("token");
      const user = JSON.parse(localStorage.getItem("user") || "null");
      if (!token || !user || user.role !== "admin") {
        window.location.href = "./login.html";
      }

      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");
      const openBtn = document.getElementById("sidebarOpen");
      const closeBtn = document.getElementById("sidebarClose");

      const openSidebar = () => {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      };
      const closeSidebar = () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
        document.body.style.overflow = "";
      };

      openBtn.addEventListener("click", openSidebar);
      closeBtn.addEventListener("click", closeSidebar);
      overlay.addEventListener("click", closeSidebar);

      const logoutBtn = document.getElementById("logoutBtn");
      const filterForm = document.getElementById("filterForm");
      const resultsBody = document.getElementById("resultsBody");
      const messageBox = document.getElementById("messageBox");
      const countLabel = document.getElementById("countLabel");

      const stressBandFromMood = (mood) => {
        if (mood === "Happy") return "Low";
        if (mood === "Stressed" || mood === "Angry") return "High";
        return "Medium";
      };

      logoutBtn.addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "./login.html";
      });

      const getFilterQuery = () => {
        const params = new URLSearchParams();
        ["language", "mood", "emotion", "fromDate", "toDate", "query"].forEach((id) => {
          const value = document.getElementById(id).value.trim();
          if (value) params.append(id, value);
        });
        return params.toString();
      };

      const renderRows = (feedback) => {
        resultsBody.innerHTML = "";
        feedback.forEach((item) => {
          const row = document.createElement("tr");
          row.className = "border-b border-slate-50";
          row.innerHTML = `
            <td class="whitespace-nowrap px-4 py-3 font-medium text-ink-900">${item.employee_name}</td>
            <td class="px-4 py-3 text-slate-600">${item.employee_email}</td>
            <td class="px-4 py-3">${item.language}</td>
            <td class="px-4 py-3">${stressBandFromMood(item.mood)}</td>
            <td class="px-4 py-3">${item.emotion_label}</td>
            <td class="px-4 py-3 tabular-nums">${Number(item.sentiment_score).toFixed(2)}</td>
            <td class="whitespace-nowrap px-4 py-3 text-slate-600">${new Date(item.created_at).toLocaleString()}</td>
            <td class="max-w-xs truncate px-4 py-3" title="${item.message.replace(/"/g, "&quot;")}">${item.message}</td>
          `;
          resultsBody.appendChild(row);
        });
        countLabel.textContent = `${feedback.length} record${feedback.length === 1 ? "" : "s"} found`;
      };

      const loadFeedback = async () => {
        try {
          const query = getFilterQuery();
          const response = await fetch(`${API_BASE}/admin/feedback?${query}`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Failed to load feedback.");
          renderRows(data.feedback || []);
        } catch (error) {
          messageBox.textContent = error.message;
          messageBox.className = "rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 ring-1 ring-red-100";
        }
      };

      filterForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        await loadFeedback();
      });

      loadFeedback();
    </script>
  </body>
</html>
