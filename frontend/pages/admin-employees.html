<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentiSphere AI | Employee Insights</title>
    <link rel="stylesheet" href="../css/app.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>
  </head>
  <body class="bg-grain min-h-screen font-sans text-ink-900 bg-mesh bg-ink-50 antialiased">
    <div id="sidebarOverlay" class="fixed inset-0 z-40 bg-ink-950/50 backdrop-blur-sm hidden md:hidden" aria-hidden="true"></div>

    <div class="flex min-h-screen w-full">
      <aside
        id="sidebar"
        class="fixed left-0 top-0 z-50 flex h-full w-full max-w-[18rem] -translate-x-full flex-col border-r border-white/10 bg-gradient-to-b from-ink-950 to-ink-900 text-white shadow-2xl transition-transform duration-200 ease-out md:static md:z-0 md:max-w-none md:w-72 md:translate-x-0 md:shadow-none md:border-r-0"
      >
        <div class="flex h-16 items-center justify-between border-b border-white/10 px-5 md:h-auto md:border-0 md:px-6 md:pt-8">
          <div>
            <p class="font-display text-lg font-semibold tracking-tight">SentiSphere</p>
            <p class="text-xs text-white/50">HR</p>
          </div>
          <button
            type="button"
            id="sidebarClose"
            class="rounded-lg p-2 text-white/70 hover:bg-white/10 md:hidden"
            aria-label="Close menu"
          >
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <nav class="flex-1 space-y-1 px-3 py-4 md:px-4">
          <a href="./admin-dashboard.html" class="sidebar-link text-white/80 hover:bg-white/10 hover:text-white">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M3.75 3v11.25A2.25 2.25 0 006 16.5h2.25M3.75 3h-1.5m1.5 0h16.5m0 11.25v2.25A2.25 2.25 0 0118 16.5h-2.25m-7.5 0h7.5m-7.5 0l-1 3m8.5-3l1 3m0 0l.5 1.5m-.5-1.5h-9.5m0 0l-.5 1.5M9 11.25v1.5M12 9v3.75m3-6v6" />
            </svg>
            Dashboard
          </a>
          <a href="./admin-feedback.html" class="sidebar-link text-white/80 hover:bg-white/10 hover:text-white">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
            Feedback explorer
          </a>
          <a href="./admin-employees.html" class="sidebar-link bg-white/10 text-white ring-1 ring-white/10">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
            </svg>
            Employee insights
          </a>
        </nav>
        <div class="border-t border-white/10 p-4">
          <button
            id="logoutBtn"
            type="button"
            class="sidebar-link w-full text-left text-red-200 hover:bg-red-500/20 hover:text-white"
          >
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            Sign out
          </button>
        </div>
      </aside>

      <button
        type="button"
        id="sidebarOpen"
        class="fixed left-4 top-4 z-30 flex h-11 w-11 items-center justify-center rounded-xl bg-white shadow-soft ring-1 ring-ink-900/5 md:hidden"
        aria-label="Open menu"
      >
        <svg class="h-5 w-5 text-ink-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <main class="flex-1 pt-8 md:pt-0">
        <div class="mx-auto max-w-7xl space-y-8 px-4 pb-12 pt-16 md:px-8 md:pt-10">
          <header>
            <h1 class="font-display text-3xl font-semibold text-ink-900">Employee insights</h1>
            <p class="mt-1 text-slate-600">Engagement signals and at-risk flags from aggregated feedback.</p>
          </header>

          <section class="grid grid-cols-1 gap-4 md:grid-cols-3">
            <div class="rounded-2xl bg-white p-5 shadow-soft ring-1 ring-ink-900/5 md:p-6">
              <div class="flex items-center gap-3">
                <span class="flex h-11 w-11 items-center justify-center rounded-xl bg-slate-100 text-slate-700">
                  <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M18 18.72a9.09 9.09 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
                  </svg>
                </span>
                <div>
                  <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Analysed</p>
                  <p id="employeeCount" class="text-2xl font-semibold tabular-nums text-ink-900">0</p>
                </div>
              </div>
            </div>
            <div class="rounded-2xl bg-white p-5 shadow-soft ring-1 ring-ink-900/5 md:p-6">
              <div class="flex items-center gap-3">
                <span class="flex h-11 w-11 items-center justify-center rounded-xl bg-rose-50 text-rose-700">
                  <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
                  </svg>
                </span>
                <div>
                  <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Low sentiment (&lt; 0.40)</p>
                  <p id="riskCount" class="text-2xl font-semibold tabular-nums text-rose-700">0</p>
                </div>
              </div>
            </div>
            <div class="rounded-2xl bg-white p-5 shadow-soft ring-1 ring-ink-900/5 md:p-6">
              <div class="flex items-center gap-3">
                <span class="flex h-11 w-11 items-center justify-center rounded-xl bg-amber-50 text-amber-800">
                  <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                  </svg>
                </span>
                <div>
                  <p class="text-xs font-medium uppercase tracking-wide text-slate-500">No feedback yet</p>
                  <p id="noFeedbackCount" class="text-2xl font-semibold tabular-nums text-amber-800">0</p>
                </div>
              </div>
            </div>
          </section>

          <section class="rounded-2xl bg-white p-6 shadow-card ring-1 ring-ink-900/5 md:p-8">
            <h2 class="font-display text-lg font-semibold text-ink-900">Team overview</h2>
            <div class="table-shell mt-4 overflow-x-auto">
              <table class="w-full min-w-[800px] text-left text-sm">
                <thead>
                  <tr class="text-xs font-semibold uppercase tracking-wide text-slate-500">
                    <th class="px-4 py-3">Employee</th>
                    <th class="px-4 py-3">Email</th>
                    <th class="px-4 py-3">Feedback</th>
                    <th class="px-4 py-3">Avg sentiment</th>
                    <th class="px-4 py-3">Negative</th>
                    <th class="px-4 py-3">Status</th>
                    <th class="px-4 py-3">Last feedback</th>
                  </tr>
                </thead>
                <tbody id="employeeBody" class="divide-y divide-slate-100 text-slate-700"></tbody>
              </table>
            </div>
          </section>
          <div id="messageBox" class="text-sm"></div>
        </div>
      </main>
    </div>

    <script>
      const API_BASE = "http://localhost:3001/api";
      const token = localStorage.getItem("token");
      const user = JSON.parse(localStorage.getItem("user") || "null");
      if (!token || !user || user.role !== "admin") {
        window.location.href = "./login.html";
      }

      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");
      const openBtn = document.getElementById("sidebarOpen");
      const closeBtn = document.getElementById("sidebarClose");

      const openSidebar = () => {
        sidebar.classList.remove("-translate-x-full");
        overlay.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      };
      const closeSidebar = () => {
        sidebar.classList.add("-translate-x-full");
        overlay.classList.add("hidden");
        document.body.style.overflow = "";
      };

      openBtn.addEventListener("click", openSidebar);
      closeBtn.addEventListener("click", closeSidebar);
      overlay.addEventListener("click", closeSidebar);

      const logoutBtn = document.getElementById("logoutBtn");
      const employeeBody = document.getElementById("employeeBody");
      const messageBox = document.getElementById("messageBox");
      const employeeCountEl = document.getElementById("employeeCount");
      const riskCountEl = document.getElementById("riskCount");
      const noFeedbackCountEl = document.getElementById("noFeedbackCount");

      logoutBtn.addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "./login.html";
      });

      const badge = (cls, text) =>
        `<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold ${cls}">${text}</span>`;

      const getStatusBadge = (avgSentiment, feedbackCount, negativeCount) => {
        if (Number(feedbackCount) === 0) return badge("bg-amber-50 text-amber-900 ring-1 ring-amber-100", "No data");
        if (Number(avgSentiment) < 0.4 || Number(negativeCount) >= 3) {
          return badge("bg-rose-50 text-rose-900 ring-1 ring-rose-100", "At risk");
        }
        if (Number(avgSentiment) < 0.65) return badge("bg-amber-50 text-amber-900 ring-1 ring-amber-100", "Check-in");
        return badge("bg-emerald-50 text-emerald-900 ring-1 ring-emerald-100", "Stable");
      };

      const loadEmployeeInsights = async () => {
        try {
          const response = await fetch(`${API_BASE}/admin/employees`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.message || "Failed to load employee insights.");

          const employees = data.employees || [];
          employeeCountEl.textContent = employees.length;
          riskCountEl.textContent = employees.filter(
            (item) => Number(item.avg_sentiment || 0) < 0.4 || Number(item.negative_count || 0) >= 3
          ).length;
          noFeedbackCountEl.textContent = employees.filter((item) => Number(item.feedback_count) === 0).length;

          employeeBody.innerHTML = "";
          employees.forEach((item) => {
            const row = document.createElement("tr");
            row.className = "border-b border-slate-50";
            row.innerHTML = `
              <td class="whitespace-nowrap px-4 py-3 font-medium text-ink-900">${item.name}</td>
              <td class="px-4 py-3 text-slate-600">${item.email}</td>
              <td class="px-4 py-3 tabular-nums">${item.feedback_count}</td>
              <td class="px-4 py-3 tabular-nums">${item.avg_sentiment ? Number(item.avg_sentiment).toFixed(2) : "—"}</td>
              <td class="px-4 py-3 tabular-nums">${item.negative_count || 0}</td>
              <td class="px-4 py-3">${getStatusBadge(item.avg_sentiment, item.feedback_count, item.negative_count)}</td>
              <td class="whitespace-nowrap px-4 py-3 text-slate-600">${item.last_feedback_at ? new Date(item.last_feedback_at).toLocaleString() : "—"}</td>
            `;
            employeeBody.appendChild(row);
          });
        } catch (error) {
          messageBox.textContent = error.message;
          messageBox.className = "rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700 ring-1 ring-red-100";
        }
      };

      loadEmployeeInsights();
    </script>
  </body>
</html>
