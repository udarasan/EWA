<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SentiSphere AI | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-xl bg-white rounded-2xl shadow-lg p-8">
      <h1 class="text-2xl font-bold text-slate-800">Create an Account</h1>
      <p class="text-sm text-slate-500 mt-1">Role-based registration for employee/admin</p>

      <form id="registerForm" class="mt-6 grid grid-cols-1 gap-4">
        <div>
          <label class="block text-sm font-medium text-slate-700">Name</label>
          <input
            id="name"
            type="text"
            required
            class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Email</label>
          <input
            id="email"
            type="email"
            required
            class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Password</label>
          <input
            id="password"
            type="password"
            minlength="6"
            required
            class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700">Role</label>
          <select
            id="role"
            class="w-full mt-1 rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
          >
            <option value="employee">Employee</option>
            <option value="admin">Admin (HR)</option>
          </select>
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-2.5 font-medium"
        >
          Register
        </button>
      </form>

      <p class="text-sm text-slate-600 mt-4">
        Already registered?
        <a href="./login.html" class="text-blue-600 font-medium">Back to login</a>
      </p>

      <div id="message" class="mt-4 text-sm"></div>
    </div>

    <script>
      const API_BASE = "http://localhost:3001/api";
      const form = document.getElementById("registerForm");
      const messageBox = document.getElementById("message");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        messageBox.textContent = "";

        const payload = {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
          role: document.getElementById("role").value
        };

        try {
          const response = await fetch(`${API_BASE}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || "Registration failed.");
          }

          messageBox.textContent = "Registration successful. You can now login.";
          messageBox.className = "mt-4 text-sm text-green-600";
          form.reset();
        } catch (error) {
          messageBox.textContent = error.message;
          messageBox.className = "mt-4 text-sm text-red-600";
        }
      });
    </script>
  </body>
</html>
